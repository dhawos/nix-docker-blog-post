name: Run workflow with nix
on:
  push:

env:
  IMAGE_TAG: ${{ github.sha }}-nix

jobs:
  lint:
    name: "Lint code"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - shell: "nix develop -c bash -e {0}"
        run: golangci-lint run
  test:
    name: "Test code"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - shell: "nix develop -c bash -e {0}"
        run: go test ./...
  build:
    name: "Build docker image"
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    environment:
      name: prod
      deployment: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - shell: "nix develop -c bash -e {0}"
        env:
          SCW_DEFAULT_ORGANIZATION_ID: "${{ secrets.SCW_DEFAULT_ORGANIZATION_ID}}"
          SCW_ACCESS_KEY: "${{ secrets.SCW_ACCESS_KEY }}"
          SCW_SECRET_KEY: "${{ secrets.SCW_SECRET_KEY }}"
        run: scripts/build.sh ${IMAGE_TAG}
  deploy:
    name: "Deploy code to scaleway"
    runs-on: ubuntu-latest
    environment:
      name: prod
      deployment: true
    concurrency:
      group: deploy
      cancel-in-progress: false
    needs:
      - build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - shell: "nix develop -c bash -e {0}"
        env:
          SCW_DEFAULT_ORGANIZATION_ID: "${{ vars.SCW_DEFAULT_ORGANIZATION_ID}}"
          SCW_ACCESS_KEY: "${{ secrets.SCW_ACCESS_KEY }}"
          SCW_SECRET_KEY: "${{ secrets.SCW_SECRET_KEY }}"
          CONTAINER_ID: "${{ vars.CONTAINER_ID }}"
        run: scripts/deploy.sh
