name: Run workflow with docker
on:
  push:

env:
  IMAGE_TAG: ${{ github.sha }}-nix

permissions:
  contents: read
  id-token: write

jobs:
  codegen:
    name: "Ensure code is generated"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/dhawos/nix-docker-blog-post-ci:v0.3.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
      - run: scripts/codegen.sh
  lint:
    name: "Lint code"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/dhawos/nix-docker-blog-post-ci:v0.3.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: golangci-lint run
  test:
    name: "Test code"
    runs-on: ubuntu-latest
    needs:
      - codegen
    container:
      image: ghcr.io/dhawos/nix-docker-blog-post-ci:v0.3.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: go test ./...
  build:
    name: "Build docker image"
    environment:
      name: prod
      deployment: false
    runs-on: ubuntu-latest
    # Here we don't really need to run in a container since we are only running a docker
    # build, as long as we have the docker binary, we are good
    needs:
      - codegen
      - lint
      - test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - shell: "bash"
        env:
          SCW_DEFAULT_ORGANIZATION_ID: "${{ secrets.SCW_DEFAULT_ORGANIZATION_ID}}"
          SCW_ACCESS_KEY: "${{ secrets.SCW_ACCESS_KEY }}"
          SCW_SECRET_KEY: "${{ secrets.SCW_SECRET_KEY }}"
        run: scripts/build.sh ${IMAGE_TAG}
  deploy:
    name: "Deploy code to scaleway"
    runs-on: ubuntu-latest
    environment:
      name: prod
      deployment: true
    container:
      image: ghcr.io/dhawos/nix-docker-blog-post-ci:v0.3.0
    concurrency:
      group: deploy
      cancel-in-progress: false
    needs:
      - build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - shell: "bash"
        env:
          SCW_DEFAULT_ORGANIZATION_ID: "${{ vars.SCW_DEFAULT_ORGANIZATION_ID}}"
          SCW_ACCESS_KEY: "${{ secrets.SCW_ACCESS_KEY }}"
          SCW_SECRET_KEY: "${{ secrets.SCW_SECRET_KEY }}"
          CONTAINER_ID: "${{ vars.CONTAINER_ID }}"
        run: scripts/deploy.sh
